<!-- ============================================================
     Tambahkan snippet ini ke /var/ossec/etc/ossec.conf di Manager
     URUTAN: whitelist di <global>, command & active-response setelahnya
     ============================================================ -->

<!-- 1. Whitelist IP yang TIDAK BOLEH diblokir SOAR -->
<global>
  <!-- Subnet internal Azure (termasuk admin SSH) -->
  <white_list>10.0.0.0/24</white_list>
  <!-- Azure probe / health check -->
  <white_list>168.63.129.16</white_list>
  <!-- Ganti dengan IP publik laptop admin kamu -->
  <white_list>114.10.47.78</white_list>
</global>

<!-- 2. Daftarkan script karantina malware -->
<command>
  <name>remove-malware</name>
  <executable>remove-malware.py</executable>
  <timeout_allowed>no</timeout_allowed>
</command>

<!-- 3. SOAR Playbook 1: Auto-block IP saat HTTP Flood terdeteksi -->
<!--    CATATAN: Gunakan rule 100402 (korelasi), BUKAN 100200/100201/100202 (per-paket)! -->
<!--    Firewall-drop per-paket akan memblokir IP admin sendiri. -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100402</rules_id>
  <timeout>120</timeout>   <!-- Blokir 120 detik, lalu rollback otomatis -->
</active-response>

<!-- 4. SOAR Playbook 2: Auto-quarantine malware di Agent-1 -->
<!--    CATATAN: location HARUS defined-agent, bukan local! -->
<!--    local = jalankan di Manager (salah). defined-agent = jalankan di Agent-1 (benar). -->
<active-response>
  <command>remove-malware</command>
  <location>defined-agent</location>
  <agent_id>001</agent_id>    <!-- ID agent-1 di Wazuh -->
  <rules_id>100300,100301</rules_id>
</active-response>
