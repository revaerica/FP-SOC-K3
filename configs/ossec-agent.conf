<!-- ============================================================
     Tambahkan snippet ini ke /var/ossec/etc/ossec.conf di Agent-1
     Letakkan tepat di atas tag penutup </ossec_config>
     ============================================================ -->

<!-- Kernel log untuk menangkap alert iptables DDoS (SYN/UDP/ICMP) -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/kern.log</location>
</localfile>

<!-- Access log web server (format Apache Combined) -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/webserver/access.log</location>
</localfile>

<!-- Log ClamAV untuk deteksi malware -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/clamav/clamav.log</location>
</localfile>
